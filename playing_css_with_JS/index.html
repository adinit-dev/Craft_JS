<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing with css using JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Update CSS variables using with <span class="js">JS</span></h1>

        <div>
            <img src="https://img.freepik.com/premium-photo/real-estate-building_985276-4199.jpg" alt="dog" height="500px" width="500px">
        </div>

        <div class="control">
            <label for="space"> Spacing :</label>
            <input type="range" name="space" min="0" max="100" value="10" data-sizing="px">

            <label for="blur">Blur :</label>
            <input type="range" name="blur" min="0" max="100" value="10" data-sizing="px">

            <label for="base">Base color :</label>
            <input type="color" name="base" value="#ff23f">

        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
